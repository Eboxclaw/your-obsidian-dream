name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: stable Rust with clippy and rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: install cmake via Homebrew
        run: brew install cmake

      - name: rust cache for src-tauri
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --all -- --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-features -- -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

      - name: cargo check --target aarch64-apple-darwin
        working-directory: src-tauri
        run: cargo check --target aarch64-apple-darwin

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Node 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npx tsc --noEmit
        run: npx tsc --noEmit

      - name: grep-based forbidden-pattern checks for localhost, fetch(, localStorage, process.env under src/
        run: |
          ! rg -n "localhost" src/
          ! rg -n "fetch\\(" src/
          ! rg -n "localStorage" src/
          ! rg -n "process\.env" src/

  android-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK setup
        uses: android-actions/setup-android@v3

      - name: run ./gradlew lint in android/
        working-directory: android
        run: ./gradlew lint
